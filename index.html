<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Explorador Visual Inteligente</title>

<style>
body {
  font-family: Arial;
  background: #e6eef7;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.card {
  background: white;
  padding: 25px;
  border-radius: 20px;
}

input {
  width: 100%;
  padding: 15px;
  border-radius: 12px;
  border: 1px solid #ccc;
}

button {
  padding: 12px 18px;
  border: none;
  border-radius: 10px;
  margin-top: 10px;
  cursor: pointer;
}

.primary {
  background: #3b82f6;
  color: white;
}

.soft {
  background: #cbd5e1;
}

#resultadoImagem img {
  width: 100%;
  border-radius: 12px;
  margin-top: 15px;
}
</style>

</head>

<body>

<div class="container">
  <div class="card">
    <h1>🔎 Explorador Visual Inteligente</h1>

    <input id="searchQuery" placeholder="Digite ou fale..." />

    <button class="primary" onclick="buscar()">Buscar</button>
    <button class="soft" onclick="falar()">🎤 Falar</button>

    <div id="resultadoImagem"></div>
    <div id="status"></div>

  </div>
</div>

<script>

// 🔊 VOZ
function falar() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    alert("Use o Google Chrome");
    return;
  }

  const recognition = new SpeechRecognition();
  recognition.lang = "pt-BR";

  recognition.start();

  recognition.onresult = function(event) {
    const texto = event.results[0][0].transcript;
    document.getElementById("searchQuery").value = texto;
    buscar();
  };
}

// 🔎 BUSCA
function buscar() {
  const termo = document.getElementById("searchQuery").value;

  if (!termo) return;

  const texto = gerarTexto(termo);
  mostrarResultado(termo, texto);
}

// 🧠 TEXTO INTELIGENTE
function gerarTexto(termo) {
  const base = termo.toLowerCase();

  if (base.includes("avião"))
    return "Avião é um meio de transporte que voa e leva pessoas e cargas pelo ar.";

  if (base.includes("carro"))
    return "Carro é um veículo usado para transportar pessoas.";

  if (base.includes("gato"))
    return "Gato é um animal doméstico conhecido por ser independente.";

  return "Isso é sobre " + termo + ". É algo importante para aprender.";
}

// 🖼️ IMAGEM COM FALLBACK (SOLUÇÃO DEFINITIVA)
function mostrarResultado(termo, texto) {

  const imgPrincipal = "https://source.unsplash.com/600x400/?" + termo;
  const imgBackup = "https://loremflickr.com/600/400/" + termo;

  document.getElementById("resultadoImagem").innerHTML = `
    <h2>${termo}</h2>

    <img 
      src="${imgPrincipal}" 
      onerror="this.onerror=null;this.src='${imgBackup}'"
    />

    <p style="font-size:18px; margin-top:15px;">
      ${texto}
    </p>

    <a href="https://www.google.com/search?tbm=isch&q=${termo}" target="_blank">
      <button class="primary">Ver mais imagens</button>
    </a>
  `;

  document.getElementById("status").innerText = "Pesquisa concluída com sucesso";
}

</script>

</body>
</html>
